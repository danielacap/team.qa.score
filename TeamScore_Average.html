<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team QA Score Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2, h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        label {
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input[type="number"], input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .analyst-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .analyst-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .analyst-row {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }
        .analyst-name {
            flex: 1;
            font-weight: 600;
            color: #2c3e50;
            font-size: 16px;
        }
        .score-input {
            width: 80px;
            margin-right: 10px;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
        }
        .btn-primary {
            background-color: #3498db;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 18px;
        }
        .btn-primary:hover { background-color: #2980b9; }
        
        .btn-add {
            background-color: #2ecc71;
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            padding: 0;
            font-size: 20px;
            line-height: 34px;
            text-align: center;
        }
        .btn-add:hover { background-color: #27ae60; }
        
        .btn-delete {
            background-color: #e74c3c;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
        }
        .btn-delete:hover { background-color: #c0392b; }

        .btn-edit {
            background-color: #9b59b6;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
            margin-left: 5px;
        }
        .btn-edit:hover { background-color: #8e44ad; }

        .btn-undo {
            background-color: #f39c12;
            color: white;
        }
        .btn-undo:hover { background-color: #d35400; }
        .btn-undo:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        
        /* Dashboard Layout */
        .dashboard-wrapper {
            margin-top: 25px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .result-box {
            background-color: #e8f8f5;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #a3e4d7;
        }
        .result-box h4 { margin: 0 0 5px 0; color: #16a085; }
        .average-score { font-size: 42px; font-weight: bold; color: #117a65; }
        
        .progress-box {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .progress-box h4 { margin: 0 0 5px 0; color: #7f8c8d; }
        .progress-val { font-size: 42px; font-weight: bold; }
        .prog-up { color: #2ecc71; }
        .prog-down { color: #e74c3c; }
        .prog-neutral { color: #7f8c8d; }

        .graph-box {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .graph-box h4 { margin: 0 0 15px 0; color: #7f8c8d; font-weight: 600; }
        
        /* SVG Graph Setup */
        .chart-container {
            width: 100%;
            height: 180px;
        }
        svg {
            width: 100%;
            height: 100%;
        }
        .chart-line {
            stroke: #3498db;
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .chart-point {
            fill: #2c3e50;
            stroke: #3498db;
            stroke-width: 3;
        }
        .chart-text {
            font-size: 11px;
            font-weight: 600;
            fill: #555;
            text-anchor: middle;
        }
        .chart-grid-line {
            stroke: #e2e8f0;
            stroke-width: 1;
            stroke-dasharray: 4;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            vertical-align: middle;
        }
        th { background-color: #f1f2f6; color: #2c3e50; }
        .week-name-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Loading Notification Overlay */
        .sync-banner {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>

<div id="syncBanner" class="sync-banner">Syncing data with Google Sheets database...</div>

<div class="container">
    <div class="top-bar">
        <h2>Team QA Score Tracker</h2>
        <button id="undoBtn" class="btn btn-undo" onclick="triggerUndo()" disabled>Undo Last Action</button>
    </div>
    
    <div class="input-field">
        <label for="weekLabel">Week Label:</label>
        <input type="text" id="weekLabel" placeholder="e.g., Week of 6/15">
    </div>

    <div class="analyst-header-row">
        <h3>Analyst Scores</h3>
        <button class="btn btn-add" onclick="promptAddAnalyst()" title="Add New Analyst">+</button>
    </div>
    
    <div class="analyst-grid" id="analystGrid"></div>

    <button class="btn btn-primary" onclick="calculateAndSave()">Calculate & Save Week</button>

    <div class="dashboard-wrapper" id="dashboardSection" style="display: none;">
        <div class="stats-row">
            <div class="result-box">
                <h4>Latest Team Average</h4>
                <div class="average-score" id="currentAverage">0%</div>
            </div>
            <div class="progress-box">
                <h4>Progress From Previous Week</h4>
                <div class="progress-val" id="progressValue">--</div>
            </div>
        </div>
        
        <div class="graph-box">
            <h4>Team Performance Trend Graph</h4>
            <div class="chart-container">
                <svg id="trendChart"></svg>
            </div>
        </div>
    </div>

    <h3 style="margin-top: 40px;">Historical Comparison</h3>
    <div class="table-wrapper">
        <table id="historyTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const defaultAnalysts = [
        "Vanessa", "Adelle", "Hunter", "Josh", "Matty", 
        "Matt C", "Kayla", "Lindsey", "Heather", "Trey", "Tonya"
    ];

    // Your production Web App URL
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIvvOt1Z9NqDpo6kqosPpeE21iySKci9TmJer2L_iAATb0rbU68DKrrb2I3vVWLnxEmw/exec";

    let analysts = JSON.parse(localStorage.getItem('qaAnalysts')) || defaultAnalysts;
    let qaHistory = [];
    let previousState = null;

    function showSyncBanner(show) {
        document.getElementById('syncBanner').style.display = show ? 'block' : 'none';
    }

    // Strips strings down to clean text completely free of trailing quotes or slashes
    function cleanString(str) {
        if (!str) return "";
        return str.toString().replace(/^["']|["']$/g, '').trim();
    }

    async function loadFromGoogleSheets() {
        showSyncBanner(true);
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            if (response.ok) {
                const sheetRows = await response.json();
                qaHistory = sheetRows.map(function(row) {
                    return {
                        week: cleanString(row.Week),
                        average: row.Average,
                        scores: JSON.parse(row.Scores || "{}")
                    };
                }).reverse();
            }
        } catch (e) {
            console.error("Failed fetching data from Google Script:", e);
        }
        showSyncBanner(false);
        renderAnalysts();
        renderTable();
        updateDashboardView();
    }

    async function commitRowToSheet(weekLabel, calculatedAvg, packagedScores, quietMode) {
        showSyncBanner(true);
        try {
            const cleanedLabel = cleanString(weekLabel);
            const rowPayload = {
                data: [{
                    Timestamp: new Date().toLocaleString(),
                    Week: cleanedLabel,
                    Average: calculatedAvg,
                    Scores: JSON.stringify(packagedScores)
                }]
            };

            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(rowPayload)
            });

            if (!quietMode) {
                alert("Scores successfully saved to your Google Sheet vault!");
            }
            setTimeout(loadFromGoogleSheets, 500);
        } catch (e) {
            alert("Network error processing connection!");
            console.error(e);
        }
        showSyncBanner(false);
    }

    async function deleteRowFromSheet(index, weekLabel, quietMode) {
        showSyncBanner(true);
        try {
            qaHistory.splice(index, 1);
            renderTable();
            updateDashboardView();

            const cleanedLabel = cleanString(weekLabel);
            const deleteUrl = GOOGLE_SCRIPT_URL + "?action=DELETE&week=" + encodeURIComponent(cleanedLabel);
            await fetch(deleteUrl, { method: 'GET', mode: 'no-cors' });
            
            if (!quietMode) {
                alert('"' + cleanedLabel + '" has been successfully removed from the cloud database!');
            }
        } catch (e) {
            console.error("Sync deletion failed:", e);
        }
        showSyncBanner(false);
    }

    function saveStateForUndo(actionType, targetData) {
        previousState = {
            analysts: JSON.parse(JSON.stringify(analysts)),
            qaHistory: JSON.parse(JSON.stringify(qaHistory)),
            lastAction: actionType,
            contextData: targetData
        };
        document.getElementById('undoBtn').disabled = false;
    }

    async function triggerUndo() {
        if (!previousState) return;
        
        const action = previousState.lastAction;
        const ctx = previousState.contextData;

        analysts = previousState.analysts;
        qaHistory = previousState.qaHistory;
        localStorage.setItem('qaAnalysts', JSON.stringify(analysts));
        renderAnalysts();
        renderTable();
        updateDashboardView();

        if (action === "SAVE") {
            await deleteRowFromSheet(0, ctx.week, true);
        } else if (action === "DELETE") {
            await commitRowToSheet(ctx.week, ctx.average, ctx.scores, true);
        }
        
        previousState = null;
        document.getElementById('undoBtn').disabled = true;
    }

    function renderAnalysts() {
        const grid = document.getElementById('analystGrid');
        grid.innerHTML = '';
        
        analysts.forEach(function(name, index) {
            const row = document.createElement('div');
            row.className = 'analyst-row';
            row.innerHTML = '<span class="analyst-name">' + name + '</span>' +
                '<input type="number" class="score-input data-score" data-name="' + name + '" min="0" max="100" placeholder="%">' +
                '<button class="btn btn-delete" onclick="deleteAnalyst(' + index + ')" title="Remove Analyst">🗑️</button>';
            grid.appendChild(row);
        });
    }

    function promptAddAnalyst() {
        const name = prompt("Enter the new analyst's name:");
        if (name && name.trim() !== "") {
            saveStateForUndo("ROSTER_CHANGE", null);
            analysts.push(name.trim());
            localStorage.setItem('qaAnalysts', JSON.stringify(analysts));
            renderAnalysts();
            renderTable();
        }
    }

    function deleteAnalyst(index) {
        if (confirm("Are you sure you want to remove " + analysts[index] + " from the active roster?")) {
            saveStateForUndo("ROSTER_CHANGE", null);
            analysts.splice(index, 1);
            localStorage.setItem('qaAnalysts', JSON.stringify(analysts));
            renderAnalysts();
            renderTable();
        }
    }

    async function deleteWeek(index) {
        const targetRecord = qaHistory[index];
        const targetedLabel = targetRecord.week;
        if (confirm('Are you sure you want to delete "' + targetedLabel + '" from the database log for everyone?')) {
            saveStateForUndo("DELETE", targetRecord);
            await deleteRowFromSheet(index, targetedLabel, false);
        }
    }

    function editWeekLabel(index) {
        alert("To update historical titles permanently, modify the record entry directly inside your master Google Sheet.");
    }

    function updateDashboardView() {
        if (qaHistory.length === 0) {
            document.getElementById('dashboardSection').style.display = 'none';
            return;
        }

        document.getElementById('dashboardSection').style.display = 'block';
        const currentWeek = qaHistory[0];
        document.getElementById('currentAverage').innerText = currentWeek.average + '%';

        const progEl = document.getElementById('progressValue');
        if (qaHistory.length > 1) {
            const previousWeek = qaHistory[1];
            const diff = (parseFloat(currentWeek.average) - parseFloat(previousWeek.average)).toFixed(2);
            
            if (diff > 0) {
                progEl.className = "progress-val prog-up";
                progEl.innerText = "▲ +" + diff + "%";
            } else if (diff < 0) {
                progEl.className = "progress-val prog-down";
                progEl.innerText = "▼ " + diff + "%";
            } else {
                progEl.className = "progress-val prog-neutral";
                progEl.innerText = "● 0.00%";
            }
        } else {
            progEl.className = "progress-val prog-neutral";
            progEl.innerText = "First Entry";
        }

        const svg = document.getElementById('trendChart');
        svg.innerHTML = ''; 

        const chronologicalData = [].concat(qaHistory).reverse();
        const totalPoints = chronologicalData.length;

        if (totalPoints === 0) return;

        const width = svg.clientWidth || 600;
        const height = 180;
        const paddingLeft = 40;
        const paddingRight = 40;
        const paddingTop = 30;
        const paddingBottom = 30;

        let averages = chronologicalData.map(function(d) { return parseFloat(d.average); });
        let maxAvg = Math.max.apply(Math, averages.concat([100]));
        let minAvg = Math.max(0, Math.min.apply(Math, averages) - 5);
        
        maxAvg = Math.min(100, maxAvg + 5);
        const avgRange = maxAvg - minAvg || 1;

        let points = [];
        for (let i = 0; i < totalPoints; i++) {
            let x = paddingLeft;
            if (totalPoints > 1) {
                x = paddingLeft + (i * (width - paddingLeft - paddingRight) / (totalPoints - 1));
            } else {
                x = width / 2;
            }
            let y = paddingTop + ((maxAvg - averages[i]) * (height - paddingTop - paddingBottom) / avgRange);
            points.push({ x: x, y: y, label: chronologicalData[i].week, value: chronologicalData[i].average });
        }

        const midY = height / 2;
        svg.insertAdjacentHTML('beforeend', '<line x1="' + paddingLeft + '" y1="' + midY + '" x2="' + width + '" y2="' + midY + '" class="chart-grid-line" />');

        if (points.length > 1) {
            let pathD = "M " + points[0].x + " " + points[0].y;
            for (let i = 1; i < points.length; i++) {
                pathD += " L " + points[i].x + " " + points[i].y;
            }
            svg.insertAdjacentHTML('beforeend', '<path d="' + pathD + '" class="chart-line" />');
        }

        points.forEach(function(p) {
            svg.insertAdjacentHTML('beforeend', '<text x="' + p.x + '" y="' + (height - 5) + '" class="chart-text">' + p.label + '</text>');
            svg.insertAdjacentHTML('beforeend', '<text x="' + p.x + '" y="' + (p.y - 12) + '" class="chart-text" style="fill:#117a65; font-weight:bold;">' + p.value + '%</text>');
            svg.insertAdjacentHTML('beforeend', '<circle cx="' + p.x + '" cy="' + p.y + '" r="6" class="chart-point" />');
        });
    }

    function renderTable() {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        
        let headerHTML = '<tr><th>Action</th><th>Week</th><th>Team Average</th>';
        analysts.forEach(function(name) {
            headerHTML += '<th>' + name + '</th>';
        });
        headerHTML += '</tr>';
        thead.innerHTML = headerHTML;

        tbody.innerHTML = '';
        qaHistory.forEach(function(record, index) {
            let rowHTML = '<tr>' +
                '<td><button class="btn btn-delete" onclick="deleteWeek(' + index + ')" title="Delete entry logs">🗑️</button></td>' +
                '<td><div class="week-name-cell"><strong>' + record.week + '</strong><button class="btn btn-edit" onclick="editWeekLabel(' + index + ')" title="Edit entry labels">✏️</button></div></td>' +
                '<td style="font-weight: bold; color: #117a65;">' + record.average + '%</td>';
            
            analysts.forEach(function(name) {
                const score = record.scores[name] !== undefined ? record.scores[name] + '%' : '-';
                rowHTML += '<td>' + score + '</td>';
            });
            
            rowHTML += '</tr>';
            tbody.insertAdjacentHTML('beforeend', rowHTML);
        });
    }

    async function calculateAndSave() {
        const weekHtml = document.getElementById('weekLabel');
        const week = cleanString(weekHtml.value) || "Untitled Week";
        
        const inputElements = document.querySelectorAll('.data-score');
        let total = 0;
        let count = 0;
        let currentScores = {};

        inputElements.forEach(function(input) {
            const name = input.getAttribute('data-name');
            const val = parseFloat(input.value);
            
            if (!isNaN(val)) {
                currentScores[name] = val;
                total += val;
                count++;
            } else {
                currentScores[name] = 0;
            }
        });

        if (count === 0) {
            alert("Please enter at least one score before calculating.");
            return;
        }

        const average = (total / count).toFixed(2);

        const newRecord = {
            week: week,
            average: average,
            scores: currentScores
        };

        saveStateForUndo("SAVE", newRecord);
        qaHistory.unshift(newRecord);

        renderTable();
        updateDashboardView();

        inputElements.forEach(function(input) { input.value = ''; });
        weekHtml.value = '';

        await commitRowToSheet(week, average, currentScores, false);
    }

    window.addEventListener('resize', updateDashboardView);

    loadFromGoogleSheets();
</script>

</body>
</html>
